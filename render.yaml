services:
  - type: web
    name: tracker-cta
    runtime: node
    region: frankfurt
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22.19.0
      - key: IP_SALT
        generateValue: true
      - key: DATA_DIR
        value: /opt/render/project/src/data
    disk:
      name: tracker-cta-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
