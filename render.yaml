services:
  - type: web
    name: tracker-cta
    runtime: node
    region: frankfurt
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22.19.0
      - key: IP_SALT
        generateValue: true
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: trackercta
